<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BEKYA · Login</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #ffffff;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    .login-card {
      background: #ffffff;
      width: 100%;
      max-width: 420px;
      border-radius: 32px;
      box-shadow: 0 20px 40px -10px rgba(15, 81, 50, 0.15), 0 8px 20px -6px rgba(15, 81, 50, 0.1);
      padding: 2.5rem 2rem;
      border: 1px solid rgba(15, 81, 50, 0.1);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .login-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 28px 48px -12px rgba(15, 81, 50, 0.25);
    }

    h1 {
      color: #0f5132;
      font-weight: 600;
      font-size: 2.2rem;
      letter-spacing: -0.02em;
      margin-bottom: 0.25rem;
    }

    .sub {
      color: #0f5132;
      font-size: 0.95rem;
      opacity: 0.7;
      margin-bottom: 2.5rem;
      border-left: 4px solid #0f5132;
      padding-left: 0.75rem;
      font-weight: 400;
    }

    .field {
      margin-bottom: 2rem;
    }

    label {
      display: block;
      color: #0f5132;
      font-size: 0.85rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.03em;
      margin-bottom: 0.5rem;
    }

    input {
      width: 100%;
      background: #ffffff;
      border: 2px solid rgba(15, 81, 50, 0.25);
      border-radius: 20px;
      padding: 0.9rem 1.4rem;
      font-size: 1rem;
      color: #0f5132;
      outline: none;
      transition: all 0.2s;
    }

    input:focus {
      border-color: #0f5132;
      box-shadow: 0 0 0 4px rgba(15, 81, 50, 0.15);
    }

    input::placeholder {
      color: #0f5132;
      opacity: 0.4;
      font-weight: 300;
    }

    button {
      width: 100%;
      background: #0f5132;
      border: none;
      border-radius: 40px;
      padding: 1rem;
      font-size: 1.1rem;
      font-weight: 600;
      color: white;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s, box-shadow 0.2s;
      margin-top: 0.5rem;
      letter-spacing: 0.5px;
      border: 1px solid #0f5132;
    }

    button:hover {
      background: #0d6e3a;
      box-shadow: 0 8px 18px -6px rgba(15, 81, 50, 0.4);
    }

    button:active {
      transform: scale(0.97);
    }

    .error-message {
      color: #d32f2f;
      font-size: 0.9rem;
      margin-top: 1.2rem;
      text-align: center;
      font-weight: 500;
      min-height: 1.5rem;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .error-message.show {
      opacity: 1;
    }

    .register-link {
      text-align: center;
      margin-top: 2rem;
    }

    .register-link a {
      color: #0f5132;
      text-decoration: none;
      font-size: 0.95rem;
      font-weight: 500;
      border-bottom: 1px dashed rgba(15, 81, 50, 0.3);
      transition: border-color 0.2s;
    }

    .register-link a:hover {
      border-bottom-color: #0f5132;
    }

    /* Responsive adjustments */
    @media (max-width: 480px) {
      .login-card {
        padding: 2rem 1.5rem;
      }
      h1 {
        font-size: 2rem;
      }
    }

    @media (max-width: 360px) {
      .login-card {
        padding: 1.5rem 1rem;
      }
      input, button {
        padding: 0.8rem 1.2rem;
      }
    }
  </style>
</head>
<body>
  <div class="login-card">
    <h1>BEKYA</h1>
    <div class="sub">welcome back</div>

    <form id="loginForm" novalidate>
      <div class="field">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" placeholder="enter your username" autocomplete="off">
      </div>

      <button type="submit" id="loginBtn">Log in →</button>
      <div id="errorMessage" class="error-message"></div>
    </form>

    <div class="register-link">
      <a href="https://ahmad-hesham-dev.github.io/FORM-BEKYA/">don't have an account? register</a>
    </div>
  </div>

  <script>
    (function() {
      // Get DOM elements
      const form = document.getElementById('loginForm');
      const usernameInput = document.getElementById('username');
      const errorDiv = document.getElementById('errorMessage');

      // Handle form submission
      form.addEventListener('submit', function(event) {
        event.preventDefault(); // Prevent page reload

        // Get username and trim whitespace
        const username = usernameInput.value.trim();

        // Clear any previous error message
        errorDiv.textContent = '';
        errorDiv.classList.remove('show');

        // Validate input
        if (!username) {
          errorDiv.textContent = 'Please enter your username.';
          errorDiv.classList.add('show');
          return;
        }

        // --- AUTHENTICATION LOGIC ---
        // 1. Read users array from localStorage
        const storedUsers = localStorage.getItem('users');
        let users = [];

        if (storedUsers) {
          try {
            users = JSON.parse(storedUsers);
            // Ensure it's an array (in case of corrupted data)
            if (!Array.isArray(users)) {
              users = [];
            }
          } catch (e) {
            users = [];
          }
        }

        // 2. Search for a user with matching username
        const foundUser = users.find(user => user.username === username);

        // 3. If user found, redirect based on role
        if (foundUser) {
          const role = foundUser.role;

          if (role === 'seller') {
            window.location.href = 'https://ahmad-hesham-dev.github.io/SELLER-FORM-/';
          } else if (role === 'outlet') {
            window.location.href = 'https://ahmad-hesham-dev.github.io/OUTLET-FORM/';
          } else {
            // If role is unknown (e.g., admin), show error (or redirect to a default)
            errorDiv.textContent = 'User role not recognized.';
            errorDiv.classList.add('show');
          }
        } else {
          // 4. Username not found -> display error message
          errorDiv.textContent = 'Username is incorrect';
          errorDiv.classList.add('show');
        }
      });
    })();
  </script>
</body>
</html>
